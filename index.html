<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI & Chips Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060608;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-bar {
      display: flex;
      align-items: center;
      background: rgba(6,6,8,0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(56,189,248,0.15);
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
      height: 48px;
      flex-shrink: 0;
      gap: 2px;
      z-index: 100;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-logo {
      font-size: 16px;
      margin-right: 10px;
      opacity: 0.9;
      flex-shrink: 0;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
      color: rgba(226,232,240,0.6);
    }
    .tab-btn:hover { background: rgba(56,189,248,0.08); color: #e2e8f0; }
    .tab-btn.active { background: rgba(56,189,248,0.12); color: #38bdf8; }
    .tab-btn .tab-icon { font-size: 14px; }
    .tab-divider {
      width: 1px;
      height: 16px;
      background: rgba(56,189,248,0.12);
      margin: 0 6px;
      flex-shrink: 0;
    }
    .frame-container { flex: 1; position: relative; overflow: hidden; }
    iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      transition: opacity 0.2s ease;
    }
    iframe.hidden { opacity: 0; pointer-events: none; z-index: 0; }
    iframe.visible { opacity: 1; pointer-events: all; z-index: 1; }

    /* Keyboard focus ring */
    :focus-visible {
      outline: 2px solid #38bdf8;
      outline-offset: 2px;
      border-radius: 6px;
    }

    /* Tab hit area ≥ 44px for mobile touch */
    .tab-btn { min-height: 40px; }
    @media (pointer: coarse) {
      .tab-btn { min-height: 44px; padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <div class="tab-bar" role="tablist" aria-label="App tabs">
    <span class="tab-logo">🤖</span>
    <button class="tab-btn active" id="tab-briefing" role="tab" aria-selected="true" onclick="switchTab('briefing')">
      <span class="tab-icon">📰</span> AI Briefing
    </button>
    <div class="tab-divider"></div>
    <button class="tab-btn" id="tab-smh" role="tab" aria-selected="false" onclick="switchTab('smh')">
      <span class="tab-icon">📈</span> SMH After-Hours
    </button>
    <div class="tab-divider"></div>
    <button class="tab-btn" id="tab-ewy" role="tab" aria-selected="false" onclick="switchTab('ewy')">
      <span class="tab-icon">🇰🇷</span> EWY Korea
    </button>
    <div class="tab-divider"></div>
    <button class="tab-btn" id="tab-research" role="tab" aria-selected="false" onclick="switchTab('research')">
      <span class="tab-icon">🔬</span> Research
    </button>
    <div class="tab-divider"></div>
    <button class="tab-btn" id="tab-memory" role="tab" aria-selected="false" onclick="switchTab('memory')">
      <span class="tab-icon">💾</span> Memory
    </button>
  </div>

  <div class="frame-container">
    <iframe id="frame-briefing"  class="visible" src="briefing.html"  title="AI & Chips Daily Briefing"></iframe>
    <iframe id="frame-smh"       class="hidden"  src="smh.html"       title="SMH After-Hours Tracker"></iframe>
    <iframe id="frame-ewy"       class="hidden"  src="ewy.html"       title="EWY Korea Tracker"></iframe>
    <iframe id="frame-research"  class="hidden"  src="research.html"  title="AI Research Papers"></iframe>
    <iframe id="frame-memory"    class="hidden"  src="memory.html"    title="Memory Semiconductor Intelligence"></iframe>
  </div>

  <script>
    let current = 'briefing';
    function switchTab(tab) {
      if (tab === current) return;
      current = tab;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).setAttribute('aria-selected', 'true');
      document.querySelectorAll('iframe').forEach(f => {
        f.classList.remove('visible');
        f.classList.add('hidden');
      });
      document.getElementById('frame-' + tab).classList.remove('hidden');
      document.getElementById('frame-' + tab).classList.add('visible');
    }
    // Listen for postMessage from iframes (e.g. "back to briefing" button)
    window.addEventListener('message', (e) => {
      if (typeof e.data === 'string' && e.data.startsWith('switchTab:')) {
        switchTab(e.data.split(':')[1]);
      }
    });

    // Arrow-key navigation across the tab bar
    const TAB_ORDER = ['briefing', 'smh', 'ewy', 'research', 'memory'];
    document.querySelector('.tab-bar').addEventListener('keydown', (e) => {
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      const dir = e.key === 'ArrowRight' ? 1 : -1;
      const i = TAB_ORDER.indexOf(current);
      const next = TAB_ORDER[(i + dir + TAB_ORDER.length) % TAB_ORDER.length];
      switchTab(next);
      document.getElementById('tab-' + next).focus();
      e.preventDefault();
    });
  </script>
</body>
</html>
