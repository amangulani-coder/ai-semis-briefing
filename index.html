<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI & Chips Daily</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1e; font-family: 'Inter', -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .tab-bar {
      display: flex;
      align-items: center;
      background: #0d1526;
      border-bottom: 1px solid #1e293b;
      padding: 0 16px;
      height: 52px;
      flex-shrink: 0;
      gap: 4px;
      z-index: 100;
    }

    .tab-logo {
      font-size: 18px;
      margin-right: 8px;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: #64748b;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .tab-btn:hover {
      background: #1e293b;
      color: #94a3b8;
    }

    .tab-btn.active {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #e2e8f0;
    }

    .tab-btn .tab-icon { font-size: 15px; }

    .tab-divider {
      width: 1px;
      height: 20px;
      background: #1e293b;
      margin: 0 4px;
    }

    .frame-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #0a0f1e;
      transition: opacity 0.2s ease;
    }

    iframe.hidden {
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    iframe.visible {
      opacity: 1;
      pointer-events: all;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="tab-bar">
  <span class="tab-logo">🤖</span>

  <button class="tab-btn active" id="tab-briefing" onclick="switchTab('briefing')">
    <span class="tab-icon">📰</span>
    AI Briefing
  </button>

  <div class="tab-divider"></div>

  <button class="tab-btn" id="tab-smh" onclick="switchTab('smh')">
    <span class="tab-icon">📈</span>
    SMH After-Hours
  </button>
</div>

<div class="frame-container">
  <iframe id="frame-briefing" class="visible" src="briefing.html" title="AI & Chips Daily Briefing"></iframe>
  <iframe id="frame-smh" class="hidden" src="https://amangulani-coder.github.io/SMH-holdings-/" title="SMH After-Hours Tracker"></iframe>
</div>

<script>
  let current = 'briefing';
  let smhLoaded = false;

  function switchTab(tab) {
    if (tab === current) return;
    current = tab;

    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');

    document.querySelectorAll('iframe').forEach(f => {
      f.classList.remove('visible');
      f.classList.add('hidden');
    });

    const frame = document.getElementById('frame-' + tab);
    frame.classList.remove('hidden');
    frame.classList.add('visible');
  }
</script>

</body>
</html>
