<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI &amp; Chips Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }
    .tab-bar { display: flex; align-items: center; background: rgba(255,255,255,0.88); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: 0 20px; height: 48px; flex-shrink: 0; gap: 2px; z-index: 100; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-logo { font-size: 16px; margin-right: 10px; opacity: 0.8; flex-shrink: 0; }
    .tab-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; border: none; background: transparent; color: #6e6e73; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background 0.15s ease, color 0.15s ease; white-space: nowrap; flex-shrink: 0; letter-spacing: -0.1px; }
    .tab-btn:hover { background: rgba(0,0,0,0.05); color: #1d1d1f; }
    .tab-btn.active { background: rgba(0,113,227,0.1); color: #0071e3; }
    .tab-btn .tab-icon { font-size: 14px; }
    .tab-divider { width: 1px; height: 16px; background: rgba(0,0,0,0.1); margin: 0 6px; flex-shrink: 0; }
    .frame-container { flex: 1; position: relative; overflow: hidden; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #fff; transition: opacity 0.2s ease; }
    iframe.hidden { opacity: 0; pointer-events: none; z-index: 0; }
    iframe.visible { opacity: 1; pointer-events: all; z-index: 1; }
  
.wafer-bg{position:fixed;top:50%;right:-8%;transform:translateY(-50%);width:min(90vw,720px);height:min(90vw,720px);z-index:0;pointer-events:none;opacity:0.38}
.circuit-traces{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.14}
.content-layer{position:relative;z-index:1}
@keyframes trace-flow{0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0}}
.circuit-line{stroke:#38bdf8;stroke-width:0.8;fill:none;stroke-dasharray:200 800;animation:trace-flow 6s linear infinite}
.circuit-pad{fill:rgba(56,189,248,0.5)}
@media(max-width:768px){.wafer-bg{opacity:0.18;right:-30%}.circuit-traces{opacity:0.07}}.tab-bar{background:rgba(6,6,12,0.88)!important;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    </style>
</head>
<body>
<!-- SILICON WAFER BG --><div class="wafer-bg" aria-hidden="true"><svg id="wafer-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="wafer-iridescent" cx="38%" cy="38%" r="65%"><stop offset="0%" stop-color="#7dd3fc"/><stop offset="14%" stop-color="#818cf8"/><stop offset="28%" stop-color="#c084fc"/><stop offset="42%" stop-color="#38bdf8"/><stop offset="56%" stop-color="#34d399"/><stop offset="70%" stop-color="#fbbf24"/><stop offset="84%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#818cf8"/></radialGradient><filter id="edge-glow" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="scan-line" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="transparent"/><stop offset="43%" stop-color="transparent"/><stop offset="47%" stop-color="rgba(120,210,255,0.07)"/><stop offset="50%" stop-color="rgba(160,230,255,0.22)"/><stop offset="53%" stop-color="rgba(120,210,255,0.07)"/><stop offset="57%" stop-color="transparent"/><stop offset="100%" stop-color="transparent"/><animateTransform attributeName="gradientTransform" type="rotate" values="0 300 300;360 300 300" dur="8s" repeatCount="indefinite"/></linearGradient><radialGradient id="wafer-shimmer" cx="28%" cy="28%" r="55%"><stop offset="0%" stop-color="rgba(255,255,255,0.14)"/><stop offset="50%" stop-color="rgba(255,255,255,0.03)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient><clipPath id="wafer-clip"><path d="M300,22 A278,278 0 1,1 216,562 L230,556 A264,264 0 0,0 300,568 A264,264 0 1,0 300,36 Z"/></clipPath></defs><circle cx="300" cy="300" r="280" fill="#07090f" stroke="#1a2a4a" stroke-width="1.5"/><circle cx="300" cy="300" r="278" fill="url(#wafer-iridescent)" clip-path="url(#wafer-clip)" opacity="0.42"/><g id="die-group" clip-path="url(#wafer-clip)"/><circle cx="300" cy="300" r="278" fill="url(#wafer-shimmer)" clip-path="url(#wafer-clip)"/><circle cx="300" cy="300" r="278" fill="url(#scan-line)" clip-path="url(#wafer-clip)"/><circle cx="300" cy="300" r="278" fill="none" stroke="rgba(56,189,248,0.22)" stroke-width="2"/><rect x="218" y="558" width="164" height="10" rx="3" fill="#060608"/><rect x="218" y="558" width="164" height="1.5" rx="1" fill="rgba(56,189,248,0.3)"/><circle cx="300" cy="300" r="282" fill="none" stroke="rgba(56,189,248,0.45)" stroke-width="2" filter="url(#edge-glow)"/><circle cx="300" cy="300" r="289" fill="none" stroke="rgba(139,92,246,0.18)" stroke-width="7"/></svg></div><svg class="circuit-traces" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="circuit-line" d="M0,180 L120,180 L120,300 L240,300" style="animation-delay:0s;animation-duration:7s"/><circle class="circuit-pad" cx="120" cy="180" r="2.5"/><circle class="circuit-pad" cx="120" cy="300" r="2.5"/><path class="circuit-line" d="M0,420 L80,420 L80,520 L180,520" style="animation-delay:1.5s;animation-duration:9s"/><circle class="circuit-pad" cx="80" cy="420" r="2.5"/><circle class="circuit-pad" cx="80" cy="520" r="2.5"/><path class="circuit-line" d="M0,660 L200,660 L200,760" style="animation-delay:3s;animation-duration:8s"/><circle class="circuit-pad" cx="200" cy="660" r="2.5"/><path class="circuit-line" d="M1440,220 L1300,220 L1300,360 L1180,360" style="animation-delay:0.8s;animation-duration:10s"/><circle class="circuit-pad" cx="1300" cy="220" r="2.5"/><circle class="circuit-pad" cx="1300" cy="360" r="2.5"/><path class="circuit-line" d="M1440,500 L1350,500 L1350,620 L1250,620" style="animation-delay:2.2s;animation-duration:7.5s"/><circle class="circuit-pad" cx="1350" cy="500" r="2.5"/><circle class="circuit-pad" cx="1350" cy="620" r="2.5"/><path class="circuit-line" d="M200,0 L200,80 L340,80" style="animation-delay:0.5s;animation-duration:6s"/><circle class="circuit-pad" cx="200" cy="80" r="2.5"/><path class="circuit-line" d="M580,0 L580,120 L460,120 L460,210" style="animation-delay:2s;animation-duration:8.5s"/><circle class="circuit-pad" cx="580" cy="120" r="2.5"/><circle class="circuit-pad" cx="460" cy="120" r="2.5"/><path class="circuit-line" d="M920,900 L920,820 L1060,820 L1060,740" style="animation-delay:1s;animation-duration:9.5s"/><circle class="circuit-pad" cx="920" cy="820" r="2.5"/><circle class="circuit-pad" cx="1060" cy="820" r="2.5"/><path class="circuit-line" d="M400,900 L400,800 L270,800 L270,710" style="animation-delay:3.5s;animation-duration:7s"/><circle class="circuit-pad" cx="400" cy="800" r="2.5"/><circle class="circuit-pad" cx="270" cy="800" r="2.5"/></svg><script>(function(){var svg=document.getElementById('wafer-svg');if(!svg)return;var g=svg.querySelector('#die-group');var cx=300,cy=300,r=268,dW=22,dH=18,gap=2;var cols=Math.ceil(600/(dW+gap)),rows=Math.ceil(600/(dH+gap));var sx=300-cols*(dW+gap)/2,sy=300-rows*(dH+gap)/2;var hues=[218,224,230,236,242];for(var row=0;row<rows;row++){for(var col=0;col<cols;col++){var x=sx+col*(dW+gap),y=sy+row*(dH+gap);var dx=x+dW/2-cx,dy=y+dH/2-cy;if(dx*dx+dy*dy<(r-6)*(r-6)){var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',dW);rect.setAttribute('height',dH);rect.setAttribute('rx','2');var h=hues[Math.floor(Math.random()*hues.length)],l=7+Math.random()*6;rect.setAttribute('fill','hsl('+h+',28%,'+l+'%)');rect.setAttribute('stroke','rgba(56,189,248,0.13)');rect.setAttribute('stroke-width','0.5');g.appendChild(rect);}}}})();</script><!-- END WAFER BG -->
<div class="content-layer">

  <div class="tab-bar" role="tablist" aria-label="App tabs">
    <span class="tab-logo">&#x1F916;</span>
    <button class="tab-btn active" id="tab-briefing" role="tab" aria-selected="true" aria-controls="frame-briefing" onclick="switchTab('briefing')"><span class="tab-icon">&#x1F4F0;</span> AI Briefing</button>
    <div class="tab-divider"></div>
    <button class="tab-btn" id="tab-smh" role="tab" aria-selected="false" aria-controls="frame-smh" onclick="switchTab('smh')"><span class="tab-icon">&#x1F4C8;</span> SMH After-Hours</button>
    <div class="tab-divider"></div>
    <button class="tab-btn" id="tab-research" role="tab" aria-selected="false" aria-controls="frame-research" onclick="switchTab('research')"><span class="tab-icon">&#x1F52C;</span> Research</button>
      <button class="tab-btn" id="tab-memory" role="tab" aria-selected="false" onclick="switchTab('memory')"><span class="tab-icon">💮</span> Memory</button>
  </div>
  <div class="frame-container">
    <iframe id="frame-briefing" class="visible" src="briefing.html" title="AI &amp; Chips Daily Briefing"></iframe>
    <iframe id="frame-smh" class="hidden" src="smh.html" title="SMH After-Hours Tracker"></iframe>
    <iframe id="frame-research" class="hidden" src="research.html" title="AI Research Papers"></iframe>
    <iframe id="frame-memory" class="hidden" src="memory.html" title="Memory Semiconductor Intelligence"></iframe>
  </div>
  <script>
    let current = 'briefing';
    function switchTab(tab) {
      if (tab === current) return;
      current = tab;
      document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      const activeBtn = document.getElementById('tab-' + tab);
      activeBtn.classList.add('active');
      activeBtn.setAttribute('aria-selected', 'true');
      document.querySelectorAll('iframe').forEach(f => { f.classList.remove('visible'); f.classList.add('hidden'); });
      const frame = document.getElementById('frame-' + tab);
      frame.classList.remove('hidden');
      frame.classList.add('visible');
    }
  </script>
</div>
</body>
</html>
